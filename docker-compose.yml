services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped

    # ── Port publik ──────────────────────────────────────────────
    # Hanya port 80 yang diekspos ke host. Ini BUKAN network_mode:host —
    # container tetap terisolasi, hanya port 80 yang menembus boundary.
    ports:
      - "80:80"

    # ── Akses MySQL di host ──────────────────────────────────────
    # `host.docker.internal` resolve ke host lewat gateway bridge Docker.
    # Container bisa mencapai MySQL host tanpa membuka isolasi network.
    # Set DB_HOST=host.docker.internal di .env.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # ── Hardening ────────────────────────────────────────────────
    # no-new-privileges: proses di container tidak bisa menaikkan hak akses.
    # cap_drop ALL lalu add hanya capability yang dibutuhkan: bind port 80
    # (<1024) dan mengganti user worker nginx/php-fpm.
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE

    env_file:
      - .env

    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs

volumes:
  storage_data:
  logs_data:
